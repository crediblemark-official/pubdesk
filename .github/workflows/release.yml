name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'
      - 'pub-desktop-v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
        app: [pub-admin, pub-billing, pub-files, pub-ops]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<$EOF" >> $GITHUB_OUTPUT
          git log --since="midnight" --pretty=format:"- %s" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Monorepo Dependencies
        run: bun install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: pub-desktop-v__VERSION__
          releaseName: '🚀 PubDesk Suite v__VERSION__ - Pembaruan & Peningkatan Sistem'
          releaseBody: |
            ## 🎉 Rilis Terbaru: PubDesk Suite v__VERSION__
            
            Pembaruan terbaru untuk seluruh paket aplikasi **PubDesk Suite** kini tersedia! Rilis ini mencakup 4 aplikasi:
            - 📊 **pub-admin**
            - 💳 **pub-billing**
            - 📁 **pub-files**
            - ⚙️ **pub-ops**
            
            ### 📝 Changelog Hari Ini
            ${{ steps.changelog.outputs.commits }}
            
            ---
            
            💡 **Cara Install:** Unduh *installer* aplikasi yang Anda butuhkan sesuai dengan OS Anda (Windows `.exe`/`.msi`, Linux `.deb`/`.AppImage`/`.rpm`, atau macOS `.dmg`) pada bagian **Assets** di bawah ini, lalu jalankan.
          releaseDraft: false
          prerelease: false
          projectPath: './apps/${{ matrix.app }}'
