name: 'Publish Release'

on:
  push:
    tags:
      - 'v*' # Memicu workflow saat push tag baru, misal v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
        app: [pub-admin, pub-billing, pub-files, pub-ops]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Monorepo Dependencies
        run: bun install

      - name: Setup Windows Certificate (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_PFX_BASE64 }}")
          [System.IO.File]::WriteAllBytes("cert.pfx", $pfx_cert_byte)
        shell: powershell

      - name: Setup Signtool (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          $signtoolPath = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty DirectoryName
          echo "$signtoolPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell
      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CERT_PATH: 'cert.pfx'
          WIN_CERT_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        with:
          tagName: ${{ matrix.app }}-v__VERSION__ # Diganti otomatis dengan versi dari tauri.conf.json
          releaseName: '${{ matrix.app }} v__VERSION__'
          releaseBody: 'Unduh installer binary untuk ${{ matrix.app }} di bawah ini.'
          releaseDraft: true
          prerelease: false
          projectPath: './apps/${{ matrix.app }}'
